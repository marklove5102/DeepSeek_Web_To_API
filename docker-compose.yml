services:
  deepseek-web-to-api:
    image: ghcr.io/meow-calculations/deepseek-web-to-api:latest
    container_name: deepseek-web-to-api
    restart: always
    env_file:
      - .env
    ports:
      # Host port is configurable via DEEPSEEK_WEB_TO_API_HOST_PORT; container listens on 5001.
      - "${DEEPSEEK_WEB_TO_API_HOST_PORT:-6011}:5001"
    volumes:
      - ./data:/app/data   # config writeback, accounts SQLite, history SQLite, response cache
    environment:
      - TZ=Asia/Shanghai
      - DEEPSEEK_WEB_TO_API_BIND_ADDR=0.0.0.0
      - DEEPSEEK_WEB_TO_API_ENV_WRITEBACK=true
      - DEEPSEEK_WEB_TO_API_CONFIG_PATH=/app/data/config.json
      - DEEPSEEK_WEB_TO_API_ACCOUNTS_SQLITE_PATH=/app/data/accounts.sqlite
