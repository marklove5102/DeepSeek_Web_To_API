name: Feature request
description: Suggest an improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: Requirement
      description: Describe the problem or workflow this feature should solve.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: Describe the behavior you expect.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Compatibility impact
      description: Mention affected protocols, clients, deployment modes, or config keys if known.
  - type: textarea
    attributes:
      label: Additional context
