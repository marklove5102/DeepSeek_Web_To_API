name: Release Artifacts

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build/publish, for example v1.0.1. Empty means read VERSION."
        required: false
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-artifacts-${{ github.event.release.tag_name || github.ref_name || github.event.inputs.release_tag || github.sha }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.x"
  NODE_VERSION: "24"
  IMAGE_NAME: ghcr.io/meow-calculations/deepseek-web-to-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag=""
          case "${GITHUB_EVENT_NAME}" in
            release)
              tag="${{ github.event.release.tag_name }}"
              ;;
            push)
              tag="${GITHUB_REF_NAME}"
              ;;
            workflow_dispatch)
              tag="${{ github.event.inputs.release_tag }}"
              if [[ -z "${tag}" && -f VERSION ]]; then
                tag="$(tr -d '[:space:]' < VERSION)"
              fi
              ;;
          esac

          if [[ -z "${tag}" ]]; then
            echo "release tag is empty; provide workflow_dispatch release_tag or VERSION." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag}" >> "${GITHUB_OUTPUT}"
          echo "Resolved release tag: ${tag}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Release Blocking Gates
        run: |
          ./scripts/lint.sh
          ./tests/scripts/check-refactor-line-gate.sh
          ./tests/scripts/run-unit-all.sh

      - name: Build WebUI
        run: |
          npm ci --prefix webui --prefer-offline --no-audit
          npm run build --prefix webui

      - name: Build Multi-Platform Archives
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          BUILD_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_BUILD_JOBS: "1"
        run: ./scripts/build-release-archives.sh

      - name: Prepare Docker release inputs
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          mkdir -p dist/docker-input
          cp "dist/deepseek-web-to-api_${TAG}_linux_amd64.tar.gz" "dist/docker-input/linux_amd64.tar.gz"
          cp "dist/deepseek-web-to-api_${TAG}_linux_arm64.tar.gz" "dist/docker-input/linux_arm64.tar.gz"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta_release
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.release.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(steps.release.outputs.tag, '-') }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
          DOCKER_BUILD_SUMMARY: "false"
        with:
          context: .
          file: ./Dockerfile
          target: runtime-from-dist
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_release.outputs.tags }}
          labels: ${{ steps.meta_release.outputs.labels }}
          annotations: ${{ steps.meta_release.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image archives for release assets
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"

          docker buildx build \
            --platform linux/amd64 \
            --target runtime-from-dist \
            --cache-from type=gha \
            --output type=docker,dest="dist/deepseek-web-to-api_${TAG}_docker_linux_amd64.tar" \
            .

          docker buildx build \
            --platform linux/arm64 \
            --target runtime-from-dist \
            --cache-from type=gha \
            --output type=docker,dest="dist/deepseek-web-to-api_${TAG}_docker_linux_arm64.tar" \
            .

          gzip -f "dist/deepseek-web-to-api_${TAG}_docker_linux_amd64.tar"
          gzip -f "dist/deepseek-web-to-api_${TAG}_docker_linux_arm64.tar"

      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum *.tar.gz *.zip > sha256sums.txt)

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          FILES=(
            dist/*.tar.gz
            dist/*.zip
            dist/sha256sums.txt
          )

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${FILES[@]}" --clobber
          else
            gh release create "${TAG}" "${FILES[@]}" --title "${TAG}" --notes "Automated release artifacts for ${TAG}." --target "${GITHUB_SHA}"
          fi
